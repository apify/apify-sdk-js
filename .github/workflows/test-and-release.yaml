name: Check & Release

env:
    PUPPETEER_DOWNLOAD_BASE_URL: https://storage.googleapis.com/chrome-for-testing-public

on:
    # Push to master will deploy a dev version
    push:
        branches: [master, renovate/**]
    # PR to master branch will skip deployment
    pull_request:
        branches: [master]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build_and_test:
        name: Build & Test
        if: (!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, 'docs:'))
        runs-on: ${{ matrix.os }}

        strategy:
            fail-fast: false
            matrix:
                # tests on windows are extremely unstable
                # os: [ ubuntu-22.04, windows-2019 ]
                os: [ubuntu-22.04]
                node-version: [20, 22, 24]

        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v7
              with:
                  node-version: ${{ matrix.node-version }}

            - name: Install pnpm and dependencies
              uses: apify/actions/pnpm-install@v1.4.0

            - name: Cache Playwright browsers
              uses: actions/cache@v6
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
                  restore-keys: |
                      playwright-${{ runner.os }}-

            - name: Install Playwright browsers
              timeout-minutes: 10
              run: pnpm exec playwright install --with-deps

            - name: Build
              run: pnpm ci:build

            - name: Tests
              run: pnpm test

    docs:
        name: Docs build
        if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
        runs-on: ubuntu-22.04
        steps:
            - name: Checkout Source code
              uses: actions/checkout@v7

            - name: Use Node.js 24
              uses: actions/setup-node@v7
              with:
                  node-version: 24

            - name: Install pnpm and dependencies
              uses: apify/actions/pnpm-install@v1.4.0

            - name: Build docs
              if: github.ref != 'refs/heads/master'
              run: pnpm build
              working-directory: ./website

            - name: Run Lychee Link Checker
              id: lychee
              if: github.event_name == 'pull_request'
              uses: lycheeverse/lychee-action@v2.9.0
              with:
                  fail: false
                  args: >
                      --base-url https://docs.apify.com
                      --max-retries 6
                      --exclude="github.com"
                      --exclude="npmjs.com"
                      --exclude="docs\.apify\.com/sdk/js/assets/"
                      --no-progress
                      --timeout '60'
                      --accept '100..=103,200..=299,429'
                      --max-redirects 5
                      --format markdown
                      './website/build/**/*.html'

            - name: Find Comment
              if: github.event_name == 'pull_request'
              uses: peter-evans/find-comment@v4
              id: find-comment
              with:
                  issue-number: ${{ github.event.pull_request.number }}
                  body-includes: There are broken links in the documentation.

            - name: Links are passing
              if: github.event_name == 'pull_request' && steps.lychee.outputs.exit_code == 0 && steps.find-comment.outputs.comment-id
              uses: peter-evans/create-or-update-comment@v5
              with:
                  comment-id: ${{ steps.find-comment.outputs.comment-id }}
                  issue-number: ${{ github.event.pull_request.number }}
                  body: |
                      ✅ The link checker did not find any broken links.

                      See more at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#summary-${{ job.check_run_id }}
                  edit-mode: replace

            - name: Links are failing
              if: github.event_name == 'pull_request' && steps.lychee.outputs.exit_code != 0
              uses: peter-evans/create-or-update-comment@v5
              with:
                  comment-id: ${{ steps.find-comment.outputs.comment-id }}
                  issue-number: ${{ github.event.pull_request.number }}
                  body: |
                      ⚠️ There are broken links in the documentation.

                      See more at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#summary-${{ job.check_run_id }}
                  edit-mode: replace

    lint:
        name: Lint
        runs-on: ubuntu-22.04
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Use Node.js 24
              uses: actions/setup-node@v7
              with:
                  node-version: 24

            - name: Install pnpm and dependencies
              uses: apify/actions/pnpm-install@v1.4.0

            - name: Lint
              run: pnpm lint

            - name: Format check
              run: pnpm format:check

    publish:
        name: Publish
        if: (github.ref == 'refs/heads/master') && !contains(github.event.head_commit.message, 'docs:')
        runs-on: ubuntu-22.04
        needs: [lint, build_and_test]
        steps:
            - name: Checkout Source code
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0 # we need to pull everything to have correct dev version suffix
                  ref: master

            - name: Use Node.js 24
              uses: actions/setup-node@v7
              with:
                  node-version: 24

            - name: Install pnpm and dependencies
              uses: apify/actions/pnpm-install@v1.4.0

            - name: Publish beta to npm
              uses: apify/actions/execute-workflow@v1.4.0
              with:
                  workflow: publish-to-npm.yaml
                  inputs: >
                      {
                          "ref": "${{ github.sha }}",
                          "tag": "next"
                      }
