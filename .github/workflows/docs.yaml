name: docs

on:
    push:
        branches:
            - master
    workflow_dispatch:

jobs:
    build:
        if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
        environment:
            name: github-pages
        permissions:
            contents: write
            pages: write
            id-token: write
        runs-on: ubuntu-22.04

        steps:
            - uses: actions/checkout@v6
              with:
                  token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Install pnpm and dependencies
              uses: ./.github/actions/pnpm-install

            - name: Update docs theme
              run: pnpm --filter apify-sdk-website update @apify/docs-theme

            - name: Build docs
              run: pnpm build
              working-directory: ./website
              env:
                  APIFY_SIGNING_TOKEN: ${{ secrets.APIFY_SIGNING_TOKEN }}
                  SMARTLOOK_PROJECT_KEY: ${{ secrets.SMARTLOOK_DOCS_PROJECT_KEY }}
                  SEGMENT_TOKEN: ${{ secrets.SEGMENT_TOKEN }}

            - name: Commit the updated package.json and lockfile
              uses: stefanzweifel/git-auto-commit-action@v7
              with:
                  commit_message: 'chore: Automatic theme updating workflow [skip ci]'
                  file_pattern: 'website/package.json pnpm-lock.yaml'
                  commit_user_name: Apify Bot
                  commit_user_email: my-github-actions-bot@example.org
                  commit_author: Apify Bot <apify@apify.com>

            - name: Set up GitHub Pages
              uses: actions/configure-pages@v6

            - name: Upload GitHub Pages artifact
              uses: actions/upload-pages-artifact@v4
              with:
                  path: ./website/build

            - name: Deploy artifact to GitHub Pages
              uses: actions/deploy-pages@v5

            - name: Invalidate CloudFront cache
              run: |
                  gh workflow run invalidate-cloudfront.yml \
                      --repo apify/apify-docs-private \
                      --field deployment=apify-docs
                  echo "✅ CloudFront cache invalidation workflow triggered successfully"
              env:
                  GITHUB_TOKEN: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
